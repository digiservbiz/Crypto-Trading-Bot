# Configuration for the crypto trading bot

data:
  sample_data_path: data/sample_ohlcv.csv
  symbols: ['BTC/USDT', 'ETH/USDT']
  timeframe: '5m'
  lookback: 60

models:
  model_type: 'lstm' # Can be 'lstm' or 'transformer'
  model_selection:
    enabled: true
    volatility_threshold: 0.02 # Threshold to switch between models
  garch:
    p: 1
    q: 1
  anomaly:
    contamination: 0.05
  lstm:
    hidden_size: 64
    num_layers: 2
  transformer:
    d_model: 64
    nhead: 4
    num_encoder_layers: 2
    dim_feedforward: 256
    dropout: 0.1

training:
  batch_size: 2048
  max_epochs: 100

inference:
  models_dir: 'models'

exchange:
  name: 'binance'
  # Leave blank — set EXCHANGE_API_KEY and EXCHANGE_SECRET_KEY env vars instead
  api_key: ''
  secret_key: ''

trading:
  risk_percentage: 0.01
  stop_loss_percentage: 0.02
  take_profit_percentage: 0.04
  trailing_stop:
    enabled: true
    percentage: 0.01
  dynamic_take_profit:
    enabled: true
    volatility_multiplier: 2
  dynamic_position_sizing:
    enabled: true
    volatility_divisor: 2

sentiment_analysis:
  enabled: true
  time_decay_factor: 0.95
  source_weights:
    CryptoCompare: 1.0
    CoinTelegraph: 0.9
    CoinDesk: 0.8

telegram:
  # Leave blank — set TELEGRAM_TOKEN and TELEGRAM_CHAT_ID env vars instead
  token: ''
  chat_id: ''

quantmind:
  # Path where research_updater.py writes and the bot reads the knowledge cache
  cache_path: 'data/research_cache.json'

  # Blended sentiment weights (must sum to 1.0)
  news_sentiment_weight: 0.6
  research_sentiment_weight: 0.4

  # Multiply position size by the research signal multiplier [0.5, 1.5]
  research_position_sizing: true

  # Concurrency for the nightly research_updater.py batch ingestion
  ingestion_concurrency: 3

  # OpenAI API key used by quant-mind paper_flow
  # Leave blank — set OPENAI_API_KEY env var instead
  openai_api_key: ''
